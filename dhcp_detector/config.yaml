name: DHCP Detector
description: Passive DHCP sniffing for presence detection via timestamp sensors
version: "1.1.1"
slug: dhcp_detector
init: false

arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386

# Requires raw socket access to the host network interface.
host_network: true
capabilities:
  - NET_RAW

# Declares that this add-on requires an MQTT broker (e.g. Mosquitto) before starting.
services:
  - mqtt:need

startup: application
boot: auto

options:
  interface: "eth0"
  devices: []
  log_level: "info"
  disable_bpf: false

schema:
  interface: str
  devices:
    - mac: str
      name: str
  log_level: "list(debug|info|warning|error)"
  disable_bpf: bool

# Selector configuration for the HA UI
ui_schema:
  log_level:
    name: Log Level
    selector:
      select:
        options:
          - label: Debug
            value: debug
          - label: Info
            value: info
          - label: Warning
            value: warning
          - label: Error
            value: error
